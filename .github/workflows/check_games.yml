name: Verif Jeux Gratuits

on:
  schedule:
    # On peut le mettre toutes les 6 heures par exemple, 
    # car la base de données empêchera les doublons !
    - cron: '0 */6 * * *' 
  workflow_dispatch: # Pour le lancer à la main quand tu veux

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write # OBLIGATOIRE pour sauvegarder la base de données

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les outils
        # On ajoute python-dotenv ici
        run: python -m pip install requests python-dotenv

      - name: Lancer le robot
        run: python main.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Sauvegarder l'historique (Base de données)
        run: |
          git config --global user.name "Github Actions Bot"
          git config --global user.email "actions@github.com"
          git add historique_jeux.db
          # Le [skip ci] évite que GitHub ne relance le bot à l'infini
          git commit -m "💾 MAJ Historique Jeux [skip ci]" || echo "Aucun nouveau jeu à sauvegarder"
          git push